<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runge Pharma | IT Ticket System</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --g:#7aa290;--gd:#5d8a78;--gl:#e8f0ed;
      --tx:#1a2e35;--mu:#64748b;--bd:#e2e8f0;
      --bg:#f4f7f6;--wh:#ffffff;--r:10px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
    .topbar{background:var(--wh);border-bottom:1px solid var(--bd);height:56px;display:flex;align-items:center;padding:0 28px;}
    .tb-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
    .content{padding:28px 32px;}
    .fw{max-width:860px;margin:0 auto;}
    .fsec{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:22px;margin-bottom:14px;}
    .fstitle{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--g);margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--bd);}
    .ig{margin-bottom:16px;}
    .lbl{display:block;font-size:12.5px;font-weight:600;margin-bottom:7px;}
    .req{color:#ef4444;margin-left:2px;}
    .inp{width:100%;padding:9px 13px;border:1.5px solid var(--bd);border-radius:8px;font-family:inherit;font-size:13.5px;background:var(--wh);color:var(--tx);outline:none;}
    .inp:focus{border-color:var(--g);}
    textarea.inp{min-height:150px;resize:vertical;}
    .rg,.cg{display:flex;flex-direction:column;gap:6px;}
    .rw,.cw{display:flex;align-items:center;gap:9px;cursor:pointer;padding:7px 11px;border-radius:8px;border:1.5px solid var(--bd);font-size:13.5px;}
    .rw:hover,.cw:hover{border-color:var(--g);background:var(--gl);}
    .rw.sel,.cw.sel{border-color:var(--g);background:var(--gl);font-weight:500;}
    input[type="radio"],input[type="checkbox"]{accent-color:var(--g);}
    .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .pzone{border:2px dashed var(--bd);border-radius:10px;padding:22px;text-align:center;color:var(--mu);font-size:13px;background:var(--bg);cursor:pointer;}
    .pzone.has{border-color:var(--g);background:var(--gl);}
    .file-list{margin-top:10px;font-size:12px;color:var(--tx);}
    .file-item{background:white;border:1px solid var(--bd);padding:7px 10px;border-radius:7px;margin-top:6px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .file-meta{display:flex;align-items:center;gap:10px;min-width:0;}
    .file-thumb{width:54px;height:54px;object-fit:cover;border-radius:6px;border:1px solid var(--bd);background:var(--bg);flex-shrink:0;}
    .file-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .file-placeholder{width:54px;height:54px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .preview-btn{border:0;background:transparent;padding:0;cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;}
    .preview-btn:focus-visible{outline:2px solid var(--g);outline-offset:2px;}
    .preview-modal{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:clamp(18px,4vw,48px);background:rgba(10,18,22,.62);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
    .preview-modal.hidden{display:none;}
    .preview-card{position:relative;display:flex;flex-direction:column;align-items:stretch;justify-content:center;width:min(980px,92vw);max-height:86vh;background:#111;border:1px solid rgba(255,255,255,.22);border-radius:14px;padding:10px;box-shadow:0 24px 80px rgba(0,0,0,.45);overflow:hidden;}
    .preview-title{color:#fff;font-size:13px;font-weight:600;padding:2px 6px 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .preview-content{display:flex;align-items:center;justify-content:center;min-height:220px;overflow:auto;border-radius:9px;background:#fff;}
    .preview-content img{display:block;width:auto;height:auto;max-width:calc(92vw - 20px);max-height:calc(86vh - 72px);object-fit:contain;user-select:none;}
    .preview-content iframe{display:block;width:100%;height:min(72vh,760px);border:0;background:#fff;}
    .preview-text{width:100%;max-height:min(72vh,760px);margin:0;padding:18px;text-align:left;white-space:pre-wrap;word-break:break-word;font:13px/1.5 ui-monospace,SFMono-Regular,Consolas,monospace;color:#111;background:#fff;}
    .preview-info{padding:30px;text-align:center;color:var(--tx);font-size:13.5px;line-height:1.55;}
    .preview-info-icon{font-size:44px;margin-bottom:12px;}
    .preview-close{position:fixed;top:22px;right:22px;width:38px;height:38px;border:0;border-radius:50%;background:white;color:var(--tx);font-size:24px;line-height:1;cursor:pointer;box-shadow:0 8px 26px rgba(0,0,0,.28);z-index:10000;}
    .remove{border:0;background:#ef4444;color:white;border-radius:5px;padding:2px 7px;cursor:pointer;}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:inherit;}
    .btn:disabled{opacity:.5;cursor:not-allowed;}
    .btn-p{background:var(--g);color:#fff;}
    .alert{padding:9px 13px;border-radius:8px;font-size:12.5px;margin-bottom:12px;}
    .alert-e{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;}
    .success{display:flex;flex-direction:column;align-items:center;padding:60px 20px;text-align:center;background:white;border:1px solid var(--bd);border-radius:var(--r);}
    .success h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin:14px 0 8px;}
    .success p{color:var(--mu);font-size:13.5px;line-height:1.6;max-width:420px;margin-bottom:20px;}
    .hidden{display:none;}
    @media(max-width:700px){.dgrid{grid-template-columns:1fr}.content{padding:18px}}
  </style>
</head>

<body>
  <div class="topbar">
    <div class="tb-title">Runge Pharma Ticket System</div>
  </div>

  <div class="content">
    <div class="fw" id="app">
      <form id="ticketForm">

        <div class="fsec">
          <div class="fstitle">📝 Neues IT-Ticket</div>

          <div id="formErr" class="alert alert-e hidden"></div>

          <div class="dgrid">
            <div class="ig">
              <label class="lbl">Dein Name<span class="req">*</span></label>
              <input class="inp" id="name" required placeholder="Max Mustermann" />
            </div>
            <div class="ig">
              <label class="lbl">E-Mail<span class="req">*</span></label>
              <input class="inp" id="email" required type="email" placeholder="name@rungepharma.de" />
            </div>
          </div>

          <div class="ig">
            <label class="lbl">Kurztitel<span class="req">*</span></label>
            <input class="inp" id="titel" required placeholder="Kurze Beschreibung des Problems" />
          </div>

          <div class="ig">
            <label class="lbl">Art des Anliegens<span class="req">*</span></label>
            <div class="rg">
              <label class="rw"><input type="radio" name="type" value="🔧 Technische Störung" required /> 🔧 Technische Störung</label>
              <label class="rw"><input type="radio" name="type" value="💻 Gerät ausleihen" /> 💻 Gerät ausleihen</label>
              <label class="rw"><input type="radio" name="type" value="💡 Änderung / Anfrage" /> 💡 Änderung / Anfrage</label>
            </div>
          </div>
        </div>

        <div id="stoerung" class="fsec hidden">
          <div class="fstitle">🔧 Störungsdetails</div>

          <div class="ig">
            <label class="lbl">Kategorie<span class="req">*</span></label>
            <div class="rg" id="cats"></div>
          </div>

          <div class="ig">
            <label class="lbl">Problembeschreibung<span class="req">*</span></label>
            <textarea class="inp" id="desc" placeholder="Bitte ausführlich beschreiben…"></textarea>
          </div>

          <div class="dgrid">
            <div class="ig">
              <label class="lbl">Seit wann?<span class="req">*</span></label>
              <div class="rg" id="since"></div>
            </div>
            <div class="ig">
              <label class="lbl">Wer ist betroffen?<span class="req">*</span></label>
              <div class="rg" id="affected"></div>
            </div>
          </div>
        </div>

        <div id="geraet" class="fsec hidden">
          <div class="fstitle">💻 Gerätedetails</div>

          <div class="ig">
            <label class="lbl">Gewünschtes Gerät<span class="req">*</span></label>
            <div class="cg" id="devs"></div>
          </div>

          <div class="ig">
            <label class="lbl">Zweck der Nutzung<span class="req">*</span></label>
            <div class="rg" id="purposes"></div>
          </div>

          <div class="dgrid">
            <div class="ig">
              <label class="lbl">Von</label>
              <input class="inp" type="date" id="von" />
            </div>
            <div class="ig">
              <label class="lbl">Bis</label>
              <input class="inp" type="date" id="bis" />
            </div>
          </div>
        </div>

        <div id="change" class="fsec hidden">
          <div class="fstitle">💡 Anfrage-Details</div>

          <div class="ig">
            <label class="lbl">Art der Anfrage<span class="req">*</span></label>
            <div class="rg" id="reqs"></div>
          </div>

          <div class="ig">
            <label class="lbl">Beschreibung<span class="req">*</span></label>
            <textarea class="inp" id="changeDesc" placeholder="Bitte ausführlich beschreiben…"></textarea>
          </div>

          <div class="ig">
            <label class="lbl">Wer ist betroffen?<span class="req">*</span></label>
            <div class="rg" id="changeAff"></div>
          </div>
        </div>

        <div id="attachments" class="fsec hidden">
          <div class="fstitle">📎 Screenshots / Anhänge optional</div>

          <div class="pzone" id="dropzone">
            <div style="font-size:28px;margin-bottom:8px">📋</div>
            <div><strong>Strg+V</strong> für Screenshot einfügen</div>
            <div style="font-size:11.5px;margin-top:5px;opacity:.7">Oder Datei auswählen / Drag & Drop</div>

            <label style="display:inline-flex;align-items:center;gap:5px;margin-top:12px;cursor:pointer;color:var(--g);font-weight:600;font-size:12.5px;">
              📁 Datei auswählen
              <input id="fileInput" type="file" multiple accept="image/*,.pdf,.txt,.csv,.doc,.docx,.xls,.xlsx" style="display:none" />
            </label>

            <div class="file-list" id="fileList"></div>
          </div>
        </div>

        <button id="submitBtn" type="submit" class="btn btn-p hidden" style="width:100%;justify-content:center;padding:13px;font-size:14px;">
          ✉️ Ticket absenden
        </button>

      </form>
    </div>
  </div>

  <div id="previewModal" class="preview-modal hidden" aria-hidden="true">
    <div class="preview-card" role="dialog" aria-modal="true" aria-label="Anhangvorschau">
      <button type="button" class="preview-close" id="previewClose" aria-label="Vorschau schließen">×</button>
      <div class="preview-title" id="previewTitle"></div>
      <div class="preview-content" id="previewContent"></div>
    </div>
  </div>

  <script>
    const SB_URL = "https://kdbwpftahhkufzynmifd.supabase.co";
    const SB_KEY = "sb_publishable_figCNfCQKXOVpPWXgAuMJA_DZ7lTiOq";
    const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

    const CATS = ["Hardware","Software","Netzwerk / Internet","Drucker / Scanner","Telefon / Headset","E-Mail / Outlook","Benutzer / Passwort","Sonstiges"];
    const DEVS = ["Laptop","Bildschirm","2 Bildschirme","Maus","Tastatur","Headset","Kamera","Kompletter Arbeitsplatz","Sonstiges"];
    const PURPOSES = ["Im Haus","Außendienst","Home Office","Sonstiges"];
    const REQS = ["Verbesserungsvorschlag","Neue Software / Tool","Hardwarewunsch","Prozessänderung","Beschwerde","Sonstiges"];
    const AFFECTED = ["Nur ich","Meine Abteilung","Mehrere Abteilungen","Ganzes Unternehmen"];
    const SINCE = ["Heute","Seit gestern","Seit einigen Tagen","Seit einer Woche","Schon länger"];

    let files = [];

    function $(id) {
      return document.getElementById(id);
    }

    function getRadio(name) {
      return document.querySelector(`input[name="${name}"]:checked`)?.value || "";
    }

    function getChecks(name) {
      return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(x => x.value);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showError(msg) {
      $("formErr").textContent = msg;
      $("formErr").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function clearError() {
      $("formErr").textContent = "";
      $("formErr").classList.add("hidden");
    }

    function renderOptions(containerId, arr, name, type = "radio") {
      const el = $(containerId);
      el.innerHTML = arr.map(v => `
        <label class="${type === "checkbox" ? "cw" : "rw"}">
          <input type="${type}" name="${name}" value="${v}" /> ${v}
        </label>
      `).join("");
    }

    function refreshSelectedStyles() {
      document.querySelectorAll(".rw,.cw").forEach(label => {
        const input = label.querySelector("input");
        label.classList.toggle("sel", input.checked);
      });
    }

    function genTicketNr() {
      const d = new Date();
      return `TK-${d.getFullYear().toString().slice(2)}${String(d.getMonth()+1).padStart(2,"0")}-${String(Math.floor(Math.random()*9000)+1000)}`;
    }


    function getFileIcon(file) {
      const name = (file.name || "").toLowerCase();
      const type = file.type || "";
      if (type.startsWith("image/")) return "🖼️";
      if (type === "application/pdf" || name.endsWith(".pdf")) return "📕";
      if (type.startsWith("text/") || name.endsWith(".txt") || name.endsWith(".csv")) return "📄";
      if (name.endsWith(".doc") || name.endsWith(".docx")) return "📝";
      if (name.endsWith(".xls") || name.endsWith(".xlsx")) return "📊";
      return "📎";
    }

    function getFileKind(file) {
      const name = (file.name || "").toLowerCase();
      const type = file.type || "";
      if (type.startsWith("image/")) return "image";
      if (type === "application/pdf" || name.endsWith(".pdf")) return "pdf";
      if (type.startsWith("text/") || name.endsWith(".txt") || name.endsWith(".csv")) return "text";
      if (name.endsWith(".doc") || name.endsWith(".docx")) return "word";
      if (name.endsWith(".xls") || name.endsWith(".xlsx")) return "excel";
      return "other";
    }

    function formatFileSize(bytes) {
      if (!bytes) return "0 KB";
      const units = ["B", "KB", "MB", "GB"];
      let size = bytes;
      let unit = 0;
      while (size >= 1024 && unit < units.length - 1) {
        size /= 1024;
        unit++;
      }
      return `${size.toFixed(size >= 10 || unit === 0 ? 0 : 1)} ${units[unit]}`;
    }

    function renderFileList() {
      $("fileList").innerHTML = files.map((file, i) => {
        const kind = getFileKind(file);
        const isImage = kind === "image";
        const fileName = escapeHtml(file.name || "Anhang");
        const previewThumb = isImage
          ? `<img class="file-thumb" src="${URL.createObjectURL(file)}" alt="Vorschau von ${fileName}" />`
          : `<div class="file-placeholder" title="Vorschau öffnen">${getFileIcon(file)}</div>`;

        return `
          <div class="file-item">
            <div class="file-meta">
              <button type="button" class="preview-btn" onclick="openPreview(${i})" title="Vorschau öffnen" aria-label="${fileName} als Vorschau öffnen">
                ${previewThumb}
              </button>
              <span class="file-name">${fileName}</span>
            </div>
            <button type="button" class="remove" onclick="removeFile(${i})">x</button>
          </div>
        `;
      }).join("");

      $("dropzone").classList.toggle("has", files.length > 0);
    }

    window.openPreview = function(i) {
      const file = files[i];
      if (!file) return;

      const kind = getFileKind(file);
      const fileName = escapeHtml(file.name || "Anhang");
      const url = URL.createObjectURL(file);

      $("previewTitle").textContent = file.name || "Anhang";
      $("previewContent").innerHTML = "";

      if (kind === "image") {
        $("previewContent").innerHTML = `<img src="${url}" alt="Große Vorschau von ${fileName}" />`;
      } else if (kind === "pdf") {
        $("previewContent").innerHTML = `<iframe src="${url}" title="PDF-Vorschau von ${fileName}"></iframe>`;
      } else if (kind === "text") {
        const reader = new FileReader();
        reader.onload = () => {
          $("previewContent").innerHTML = `<pre class="preview-text"></pre>`;
          $("previewContent").querySelector(".preview-text").textContent = String(reader.result || "");
        };
        reader.onerror = () => {
          $("previewContent").innerHTML = `<div class="preview-info"><div class="preview-info-icon">📄</div>Textvorschau konnte nicht geladen werden.</div>`;
        };
        reader.readAsText(file);
        $("previewContent").innerHTML = `<div class="preview-info"><div class="preview-info-icon">📄</div>Textvorschau wird geladen…</div>`;
      } else {
        const label = kind === "word" ? "Word-Datei" : kind === "excel" ? "Excel-Datei" : "Datei";
        $("previewContent").innerHTML = `
          <div class="preview-info">
            <div class="preview-info-icon">${getFileIcon(file)}</div>
            <strong>${label}</strong><br>
            ${fileName}<br>
            ${formatFileSize(file.size)}<br><br>
            Für diesen Dateityp kann der Browser keine echte Inhaltsvorschau direkt anzeigen.
          </div>
        `;
      }

      $("previewModal").classList.remove("hidden");
      $("previewModal").setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    };

    function closePreview() {
      $("previewModal").classList.add("hidden");
      $("previewModal").setAttribute("aria-hidden", "true");
      $("previewTitle").textContent = "";
      $("previewContent").innerHTML = "";
      document.body.style.overflow = "";
    }

    $("previewClose").addEventListener("click", closePreview);
    document.querySelector(".preview-card").addEventListener("click", e => e.stopPropagation());
    $("previewModal").addEventListener("click", closePreview);
    document.addEventListener("keydown", e => {
      if (e.key === "Escape" && !$("previewModal").classList.contains("hidden")) closePreview();
    });

    window.removeFile = function(i) {
      files.splice(i, 1);
      renderFileList();
    };

    function addFiles(newFiles) {
      files.push(...Array.from(newFiles));
      renderFileList();
    }

    async function uploadFiles() {
      const urls = [];

      for (const file of files) {
        const ext = (file.name || "file").split(".").pop();
        const path = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;

        const { error } = await supabaseClient.storage
          .from("ticket-files")
          .upload(path, file);

        if (error) {
          throw new Error("Upload fehlgeschlagen: " + error.message);
        }

        const { data } = supabaseClient.storage
          .from("ticket-files")
          .getPublicUrl(path);

        urls.push(data.publicUrl);
      }

      return urls;
    }

    function resetForm() {
      location.reload();
    }

    function showSuccess() {
      $("app").innerHTML = `
        <div class="success">
          <div style="font-size:40px;margin-bottom:14px">✅</div>
          <h2>Ticket eingereicht!</h2>
          <p>Wir haben deine Anfrage erhalten und werden uns schnellstmöglich darum kümmern.</p>
          <button class="btn btn-p" onclick="location.reload()">Weiteres Ticket einreichen</button>
        </div>
      `;
    }

    renderOptions("cats", CATS, "cat");
    renderOptions("since", SINCE, "since");
    renderOptions("affected", AFFECTED, "affected");
    renderOptions("devs", DEVS, "devs", "checkbox");
    renderOptions("purposes", PURPOSES, "purpose");
    renderOptions("reqs", REQS, "reqtype");
    renderOptions("changeAff", AFFECTED, "changeAff");

    document.addEventListener("change", e => {
      if (e.target.matches("input")) {
        refreshSelectedStyles();
      }

      const type = getRadio("type");

      $("stoerung").classList.toggle("hidden", type !== "🔧 Technische Störung");
      $("geraet").classList.toggle("hidden", type !== "💻 Gerät ausleihen");
      $("change").classList.toggle("hidden", type !== "💡 Änderung / Anfrage");
      $("attachments").classList.toggle("hidden", !type);
      $("submitBtn").classList.toggle("hidden", !type);

      clearError();
    });

    $("fileInput").addEventListener("change", e => {
      addFiles(e.target.files);
    });

    $("dropzone").addEventListener("dragover", e => {
      e.preventDefault();
    });

    $("dropzone").addEventListener("drop", e => {
      e.preventDefault();
      addFiles(e.dataTransfer.files);
    });

    document.addEventListener("paste", e => {
      const pasted = [];
      for (const item of e.clipboardData?.items || []) {
        if (item.type.startsWith("image/")) {
          const file = item.getAsFile();
          if (file) pasted.push(file);
        }
      }
      if (pasted.length) addFiles(pasted);
    });

    $("ticketForm").addEventListener("submit", async e => {
      e.preventDefault();
      clearError();

      const type = getRadio("type");

      const name = $("name").value.trim();
      const email = $("email").value.trim();
      const titel = $("titel").value.trim();

      const cat = getRadio("cat");
      const desc = $("desc").value.trim();
      const since = getRadio("since");
      const affected = getRadio("affected");

      const devs = getChecks("devs");
      const purpose = getRadio("purpose");
      const von = $("von").value;
      const bis = $("bis").value;

      const reqtype = getRadio("reqtype");
      const changeDesc = $("changeDesc").value.trim();
      const changeAff = getRadio("changeAff");

      if (!name || !email || !titel || !type) {
        return showError("Bitte fülle alle Pflichtfelder aus.");
      }

      if (type === "🔧 Technische Störung") {
        if (!cat) return showError("Bitte wähle eine Kategorie aus.");
        if (!desc) return showError("Bitte beschreibe das Problem.");
        if (!since) return showError("Bitte gib an, seit wann die Störung besteht.");
        if (!affected) return showError("Bitte wähle aus, wer betroffen ist.");
      }

      if (type === "💻 Gerät ausleihen") {
        if (devs.length === 0) return showError("Bitte wähle mindestens ein Gerät aus.");
        if (!purpose) return showError("Bitte gib den Zweck der Nutzung an.");
        if (purpose !== "Home Office") {
          if (!von) return showError("Bitte gib ein Startdatum an.");
          if (!bis) return showError("Bitte gib ein Enddatum an.");
        }
      }

      if (type === "💡 Änderung / Anfrage") {
        if (!reqtype) return showError("Bitte wähle die Art der Anfrage aus.");
        if (!changeDesc) return showError("Bitte beschreibe die Anfrage.");
        if (!changeAff) return showError("Bitte wähle aus, wer betroffen ist.");
      }

      $("submitBtn").disabled = true;
      $("submitBtn").textContent = "⏳ Wird gesendet…";

      try {
        const imgUrls = await uploadFiles();

        const row = {
          "Ticket-Nr.": genTicketNr(),
          "Ticket-Datum": new Date().toLocaleDateString("de-DE"),
          "Ticket-Art": type,
          "Name": name,
          "Antragsteller": name,
          "E-Mail": email,
          "Titel": titel,
          "Kategorie": cat,
          "Status": "Offen",
          "Priorität": null,
          "Problembeschreibung": desc,
          "Seit wann Problem?": since,
          "Wer ist betroffen?": affected || changeAff,
          "Gerätetyp (Mehrere Antworten möglich)": devs.join(", "),
          "Zweck der Nutzung": purpose,
          "(Von) Zeitraum": von,
          "(Bis) Zeitraum": bis,
          "Art der Anfrage": reqtype,
          "Beschreibung": changeDesc,
          "Anlagen-URLs": JSON.stringify(imgUrls)
        };

        const { error } = await supabaseClient
          .from("tickets")
          .insert(row);

        if (error) {
          throw new Error(error.message);
        }

        showSuccess();

      } catch (err) {
        showError("Ticket konnte nicht gespeichert werden: " + err.message);
        $("submitBtn").disabled = false;
        $("submitBtn").textContent = "✉️ Ticket absenden";
        console.error(err);
      }
    });
  </script>
</body>
</html>
